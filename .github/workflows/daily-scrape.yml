name: Daily Rates Scrape

on:
  schedule:
    # Runs every day at 15:30 UTC = 21:00 (9 PM) IST
    - cron: '30 15 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rates.db
          git diff --quiet --cached || git commit -m "Auto-update rates: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ Daily Rates Scrape FAILED - ${{ github.run_id }}"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: Rates Tracker <${{ secrets.GMAIL_ADDRESS }}>
          body: |
            The daily rates scrape failed.

            Workflow:    ${{ github.workflow }}
            Repository:  ${{ github.repository }}
            Run number:  ${{ github.run_number }}
            Commit:      ${{ github.sha }}

            View full logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}